name: milsupply-env
version: "1.0.0"
description: >
  Military Logistics & Supply Chain environment where an AI agent must manage
  real-world defense supply operations: triaging supply requests, detecting
  critical shortages, and optimizing allocation of scarce resources across
  operational units to maximize readiness.

author: milsupply-team
license: MIT
tags:
  - openenv
  - military
  - logistics
  - supply-chain
  - defense
  - resource-allocation

env_url: "https://regeehugging-milsupply-env.hf.space"

tasks:
  - name: priority-classify
    difficulty: easy
    description: >
      Classify each incoming supply request as critical, high, or routine
      based on operational context, mission criticality, and item type.
      The stated urgency from requesting units may be inaccurate.
    score_range: [0.0, 1.0]
    max_steps: 1
    reset_endpoint: /reset
    step_endpoint: /step

  - name: shortage-detect
    difficulty: medium
    description: >
      Given current inventory levels and pending unit requests, identify
      which items are critically short (below reorder threshold, resupply
      delayed more than 3 days, and requested by combat-critical units).
    score_range: [0.0, 1.0]
    max_steps: 1
    reset_endpoint: /reset
    step_endpoint: /step

  - name: optimize-allocation
    difficulty: hard
    description: >
      Allocate a fixed stock of limited supplies across multiple operational
      units to maximize aggregate weighted operational readiness. Must not
      exceed available quantities for any item.
    score_range: [0.0, 1.0]
    max_steps: 1
    reset_endpoint: /reset
    step_endpoint: /step

observation_space:
  type: object
  description: >
    Structured JSON containing task context, supply requests, inventory
    levels, unit statuses, and available stock depending on the active task.

action_space:
  type: object
  description: >
    Task-specific JSON payload via MilSupplyAction model:
    - priority-classify: {task, classifications: {request_id: priority_label}}
    - shortage-detect: {task, shortage_items: [item_name, ...]}
    - optimize-allocation: {task, allocations: [{unit, item, quantity_allocated}]}

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Partial credit reward based on task-specific Rubric grader:
    - priority-classify: fraction correct, minus penalty for critical-to-routine errors
    - shortage-detect: F1 score against ground truth shortage set
    - optimize-allocation: weighted readiness gain (halved if over-allocated)

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  health: GET /health
  tasks: GET /tasks